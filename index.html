    function setupDragAndDrop(){
      const showDrop = () => els.dropHint.classList.add("show");
      const hideDrop = () => els.dropHint.classList.remove("show");

      ["dragenter", "dragover"].forEach(type => {
        window.addEventListener(type, (e) => {
          e.preventDefault();
          dragCounter++;
          showDrop();
        });
      });

      ["dragleave", "dragend"].forEach(type => {
        window.addEventListener(type, (e) => {
          e.preventDefault();
          dragCounter = Math.max(0, dragCounter - 1);
          if (dragCounter === 0) hideDrop();
        });
      });

      window.addEventListener("drop", async (e) => {
        e.preventDefault();
        dragCounter = 0;
        hideDrop();

        const files = [...(e.dataTransfer?.files || [])];
        const file = files.find(f => /\.(csv|xlsx)$/i.test(f.name));
        if (!file){
          showOverlay("드롭한 파일 중 CSV/XLSX를 찾지 못했습니다", 1800);
          return;
        }
        try{
          await loadFromFileObject(file);
        } catch (err){
          console.error(err);
          showOverlay("파일 처리 중 오류가 발생했습니다", 1800);
        }
      });
    }


    function scheduleSearchApply(delay = 45){
      clearTimeout(searchInputTimer);
      searchInputTimer = setTimeout(() => {
        applyFilter();
        requestRenderSearchSuggestions();
      }, delay);
    }

    function handleSearchKeydown(e){
      const items = getSearchSuggestions();
      if (!items.length) return;

      if (e.key === "ArrowDown"){
        e.preventDefault();
        searchFocusedIndex = Math.min(searchFocusedIndex + 1, items.length - 1);
        requestRenderSearchSuggestions();
        previewSuggestionItem(items[searchFocusedIndex]);
      } else if (e.key === "ArrowUp"){
        e.preventDefault();
        searchFocusedIndex = Math.max(searchFocusedIndex - 1, 0);
        requestRenderSearchSuggestions();
        previewSuggestionItem(items[searchFocusedIndex]);
      } else if (e.key === "Enter"){
        e.preventDefault();
        const item = items[Math.max(searchFocusedIndex, 0)];
        if (item){
          els.searchInput.value = item.type === "word" ? item.word : item.text;
          searchFocusedIndex = -1;
          els.searchSuggestions.classList.remove("open");
          els.searchSuggestions.innerHTML = "";
          restoreSearchPreview();
          applyFilter().then(() => {
            if (item.type === "word"){
              const idx = filteredGroups.findIndex(g => String(g.id) === String(item.id));
              if (idx >= 0){
                currentIndex = idx;
                if (isExampleMode()) currentMode = "Q";
                els.modeBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === currentMode));
                render(false);
                saveState();
              }
            } else if (item.type === "example"){
              const idx = filteredExamplePool.findIndex(ex => String(ex.groupId) === String(item.id) && ex.text === item.text);
              if (idx >= 0){
                currentMode = "D";
                currentPoolIndex = idx;
                els.modeBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === currentMode));
                render(false);
                saveState();
              }
            }
          });
        }
      } else if (e.key === "Escape"){
        els.searchSuggestions.classList.remove("open");
        restoreSearchPreview();
      }
    }

    function handleGlobalKeydown(e){
      if (isTypingContext()) return;

      const key = e.key.toLowerCase();

      if (e.code === "Space"){
        e.preventDefault();
        togglePlayPause();
        return;
      }

      if (e.key === "ArrowRight"){
        e.preventDefault();
        goNext(getShouldAutoplay());
        return;
      }

      if (e.key === "ArrowLeft"){
        e.preventDefault();
        goPrev(getShouldAutoplay());
        return;
      }

      if (key === "q"){ e.preventDefault(); setMode("Q"); return; }
      if (key === "w"){ e.preventDefault(); setMode("W"); return; }
      if (key === "e"){ e.preventDefault(); setMode("E"); return; }
      if (key === "a"){ e.preventDefault(); setMode("A"); return; }
      if (key === "s"){ e.preventDefault(); setMode("S"); return; }
      if (key === "d"){ e.preventDefault(); setMode("D"); return; }
      if (key === "g"){ e.preventDefault(); setMode("G"); return; }
      if (key === "t"){ e.preventDefault(); addCurrentGroupToSelection(); return; }
      if (key === "f"){ e.preventDefault(); toggleFullscreen(); return; }
      if (key === "r"){ e.preventDefault(); shuffleCurrentOrder(); return; }
      if (key === "p"){ e.preventDefault(); cyclePlaybackMode(); return; }
      if (key === "h"){ e.preventDefault(); goHome(); return; }
      if (key === "o"){ e.preventDefault(); captureCurrentStage(); return; }

      if (/^[0-9]$/.test(key)){
        e.preventDefault();
        seekToPercent(Number(key));
        return;
      }

      if (e.code === "Comma"){
        e.preventDefault();
        if (e.shiftKey) changePlaybackRate(-1);
        else stepFrame(-1);
        return;
      }

      if (e.code === "Period"){
        e.preventDefault();
        if (e.shiftKey) changePlaybackRate(1);
        else stepFrame(1);
        return;
      }

      if (e.code === "BracketLeft"){
        e.preventDefault();
        setABStart();
        return;
      }

      if (e.code === "BracketRight"){
        e.preventDefault();
        setABEnd();
        return;
      }

      if (e.key === "Escape"){
        closeMobileSheet();
      }
    }

      if (els.shuffleBtn){
        let lastShuffleTouchAt = 0;
        els.shuffleBtn.addEventListener("touchend", (e) => {

          lastShuffleTouchAt = Date.now();

        }, { passive:false });

        });

        e.target.value = "";
      });

      els.selectionExitBtn.addEventListener("click", stopSelectionMode);

      if (els.exactMatchBtn){
        els.exactMatchBtn.addEventListener("click", () => {
          exactMatch = !exactMatch;
          updateExactMatchButton();
          applyFilter();
        });

      if (els.syncRoomApplyBtn){
        els.syncRoomApplyBtn.addEventListener("click", reconnectFirebaseRoom);
      }

      if (els.syncRoomInput){

      if (els.pushCloudBtn){
        els.pushCloudBtn.addEventListener("click", () => {
          if (!firebaseReady){
            updateFirebaseStatus("Firebase 연결 대기중", "error");
            showOverlay("Firebase 연결이 아직 준비되지 않았습니다", 1500);
            return;
          }
          if (!rows.length){
            updateFirebaseStatus("업로드할 데이터 없음", "error");
            showOverlay("업로드할 데이터가 없습니다", 1300);
            return;
          }
          scheduleFirebaseDatasetUpload("manual-button", true);
          scheduleFirebaseStatePush(buildStatePayload(), true);
        });

      els.stage.addEventListener("touchstart", (e) => {
        if (e.target === els.mainImage && isImageGestureActive()) return;
        if (!e.touches || !e.touches.length) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, {passive:true});

      els.stage.addEventListener("touchend", (e) => {
        if (e.target === els.mainImage && isImageGestureActive()) return;
        if (!e.changedTouches || !e.changedTouches.length) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        if (Math.abs(dx) > 42 && Math.abs(dx) > Math.abs(dy)){
          if (dx < 0) goNext(getShouldAutoplay());
          else goPrev(getShouldAutoplay());
        }
      }, {passive:true});

      const bindTapZone = (el, fn) => {
        if (!el) return;
        let moved = false;
        el.addEventListener("touchstart", () => { moved = false; }, { passive:true });
        el.addEventListener("touchmove", () => { moved = true; }, { passive:true });
        el.addEventListener("touchend", (e) => {
          if (moved || isImageGestureActive()) return;
          e.preventDefault();
          fn();
        }, { passive:false });
        el.addEventListener("click", (e) => {
          if (isImageGestureActive()) return;
          e.preventDefault();
          fn();
        });
      };

      bindTapZone(els.tapPrevZone, () => goPrev(getShouldAutoplay()));
      bindTapZone(els.tapNextZone, () => goNext(getShouldAutoplay()));

      els.mainImage.addEventListener("load", () => {
        applyImageZoom();
      });

      els.mainImage.addEventListener("dblclick", (e) => {
        if (!canUseImageZoom()) return;
        e.preventDefault();
        if (imageZoom.scale > 1.01) resetImageZoom();
        else zoomImageAt(2.2, e.clientX, e.clientY);
      });

      els.mainImage.addEventListener("touchstart", (e) => {
        if (!canUseImageZoom()) return;
        if (e.touches.length === 2){
          imageZoom.pinching = true;
          imageZoom.panning = false;
          imageZoom.moved = true;
          imageZoom.startDistance = touchDistance(e.touches[0], e.touches[1]);
          imageZoom.startScale = imageZoom.scale;
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.touches.length === 1 && imageZoom.scale > 1.01){
          imageZoom.panning = true;
          imageZoom.pinching = false;
          imageZoom.moved = false;
          imageZoom.startX = e.touches[0].clientX;
          imageZoom.startY = e.touches[0].clientY;
          imageZoom.startOffsetX = imageZoom.x;
          imageZoom.startOffsetY = imageZoom.y;
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive:false });

      els.mainImage.addEventListener("touchmove", (e) => {
        if (!canUseImageZoom()) return;
        if (e.touches.length === 2 && imageZoom.pinching){
          const dist = touchDistance(e.touches[0], e.touches[1]);
          if (imageZoom.startDistance > 0){
            imageZoom.scale = clamp(imageZoom.startScale * (dist / imageZoom.startDistance), imageZoom.min, imageZoom.max);
            applyImageZoom();
          }
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.touches.length === 1 && imageZoom.panning && imageZoom.scale > 1.01){
          const dx = e.touches[0].clientX - imageZoom.startX;
          const dy = e.touches[0].clientY - imageZoom.startY;
          imageZoom.moved = imageZoom.moved || Math.abs(dx) > 3 || Math.abs(dy) > 3;
          imageZoom.x = imageZoom.startOffsetX + dx;
          imageZoom.y = imageZoom.startOffsetY + dy;
          applyImageZoom();
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive:false });

      els.mainImage.addEventListener("touchend", (e) => {
        if (!canUseImageZoom()) return;
        if (imageZoom.pinching && e.touches.length < 2){
          imageZoom.pinching = false;
          if (imageZoom.scale <= 1.02) resetImageZoom();
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (imageZoom.panning && e.touches.length === 0){
          imageZoom.panning = false;
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.changedTouches && e.changedTouches.length === 1 && !imageZoom.moved){
          const now = Date.now();
          const t = e.changedTouches[0];
          if (now - imageZoom.lastTapAt < 300){
            if (imageZoom.scale > 1.01) resetImageZoom();
            else zoomImageAt(2.2, t.clientX, t.clientY);
            imageZoom.lastTapAt = 0;
            e.preventDefault();
            e.stopPropagation();
            return;
          }
          imageZoom.lastTapAt = now;
        }
      }, { passive:false });

      els.mainVideo.addEventListener("error", () => {
        showOverlay("영상 자료를 불러오지 못했습니다", 1600);
      });

      els.mainImage.addEventListener("error", () => {
        showOverlay("이미지 자료를 불러오지 못했습니다", 1600);
      });

      els.mainVideo.addEventListener("loadedmetadata", () => {
        if (pendingRestoreTime !== null && isFinite(els.mainVideo.duration)){
          els.mainVideo.currentTime = Math.min(pendingRestoreTime, Math.max(0, els.mainVideo.duration - 0.1));
          pendingRestoreTime = null;
        }
      });

      els.mainVideo.addEventListener("timeupdate", () => {
        currentVideoTime = els.mainVideo.currentTime;

        if (abLoopStart !== null && abLoopEnd !== null && els.mainVideo.currentTime >= abLoopEnd){
          els.mainVideo.currentTime = abLoopStart;
          if (els.mainVideo.paused) els.mainVideo.play().catch(() => {});
        }
      });

      els.mainVideo.addEventListener("ended", () => {
        if (playbackMode === "CONT"){
          goNext(true);
        }
      });

      window.addEventListener("resize", () => {
        applyImageZoom();
        updateQuickButtons();
        updateFirebaseStatus(els.firebaseStatus?.title || els.firebaseStatus?.textContent || "대기중",
          els.firebaseStatus?.classList.contains("error") ? "error" : (els.firebaseStatus?.classList.contains("ok") ? "ok" : "normal"));
      });

      setupDragAndDrop();
      updatePlaybackButton();
      updateQuickButtons();
      updateStageGestureState();
    }

    function initEmptyState(){
      filteredGroups = [];
      // 화면 초기화 시 하단 이미지 뷰어를 숨깁니다.
      if (els.viewerBottom) {
        els.viewerBottom.style.display = "none";
      }
      filteredExamplePool = [];
      updateCount();
      renderInfo();
      renderStatus();
      showMainText(
`파일을 불러와 주세요.

기본 파일명:
${DEFAULT_FILENAME}

동작 순서
1) 기본 파일 자동 불러오기 시도
2) 실패하면 IndexedDB 캐시 복원 시도
3) 그래도 없으면 수동 파일 추가

단축키
Q/W/E/A/S/D/G 모드 전환
H 처음 화면
R 전체 순서 섞기
Space 재생/일시정지
0~9 위치 이동
, . 프레임 이동
< > 재생속도
[ ] 구간 반복
O 현재 화면 캡처`);
    }

    async function boot(){
      bindEvents();
      initEmptyState();

      try{
        await loadSelectionPresets();
      } catch (err){
        console.warn("선택학습 목록 복원 실패", err);
      }

      const firebaseStarted = await initFirebaseSync();

      let loaded = false;

      if (firebaseStarted){
        loaded = await loadInitialFirebaseSnapshot();
      }

      if (!loaded){
        loaded = await tryAutoLoadDefaultFile();
      }

      if (!loaded){
        loaded = await tryRestoreIndexedCache();
      }

      if (!loaded){
        els.statusText.textContent = "기본 파일 자동 로드 실패 - 파일을 직접 불러와 주세요";
      }

      if (firebaseStarted && rows.length){
        scheduleFirebaseStatePush(buildStatePayload(), true);
      }
    }

    boot().catch(err => {
      console.error("초기화 실패", err);
      updateFirebaseStatus("초기화 오류", "error");
      els.statusText.textContent = "초기화 중 오류가 발생했습니다";
    });
  </script>
</body>
</html>
