<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>수어 학습 사이트</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#0b0d12;
      --panel:#121722;
      --panel-2:#1a2230;
      --line:#2b3445;
      --text:#edf2ff;
      --sub:#a9b6cc;
      --accent:#6ea8ff;
      --accent-2:#8ef0c2;
      --warning:#ffc76e;
      --danger:#ff7b7b;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
      --header-h:176px;
      --footer-h:116px;
    }

    *{box-sizing:border-box;}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      overflow:hidden;
    }

    body{
      height:100vh;
      height:100dvh;
    }

    button,select,input{
      font:inherit;
    }

    .app{
      display:grid;
      grid-template-rows:auto minmax(0, 1fr) auto;
      height:100%;
      width:100%;
      min-height:0;
    }

    .header{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      background:rgba(10,13,18,.94);
      backdrop-filter:blur(10px);
      position:relative;
      z-index:50;
    }

    .header-row{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
    }

    .search-wrap{
      position:relative;
      flex:1;
      min-width:220px;
    }

    .search{
      width:100%;
      height:42px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 14px;
      background:#fff;
      color:#111;
      font-size:15px;
    }

    .search-suggestions{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      background:#fff;
      color:#111;
      border-radius:14px;
      box-shadow:0 18px 40px rgba(0,0,0,.32);
      overflow:auto;
      display:none;
      max-height:min(62vh, 520px);
      z-index:9999;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .search-suggestions.open{
      display:block;
    }

    .suggestion-item{
      padding:10px 12px;
      border-bottom:1px solid #eceff4;
      cursor:pointer;
      line-height:1.45;
      font-size:14px;
      touch-action:pan-y manipulation;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .suggestion-item:last-child{
      border-bottom:none;
    }

    .suggestion-item:hover,
    .suggestion-item.active{
      background:#eef5ff;
    }

    .suggestion-sub{
      display:block;
      font-size:12px;
      color:#56657d;
      margin-top:4px;
    }

    .scope-select,
    .category-select{
      height:42px;
      min-width:132px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 12px;
      background:#fff;
      color:#111;
      cursor:pointer;
      font-size:14px;
    }

    .count-badge{
      white-space:nowrap;
      color:var(--sub);
      font-size:13px;
      padding:0 6px;
      min-width:72px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      border-radius:12px;
      border:1px solid transparent;
      height:42px;
    }

    .quick-btn{
      display:none;
    }

    .header-row-search{
      flex-wrap:nowrap;
    }

    .header-row-search .search-wrap{
      min-width:0;
    }

    .header-row-actions,
    .header-row-sync{
      min-width:0;
    }

    .stage-tap-zone{
      position:absolute;
      top:0;
      bottom:0;
      width:18%;
      z-index:8;
      display:none;
      background:transparent;
      border:none;
      outline:none;
      padding:0;
      margin:0;
      appearance:none;
      -webkit-appearance:none;
      box-shadow:none;
      -webkit-tap-highlight-color:transparent;
    }

    .stage-tap-zone.left{ left:0; }
    .stage-tap-zone.right{ right:0; }

    .stage-tap-zone::after{
      content:"";
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:34px;
      height:34px;
      border-radius:999px;
      background:rgba(5,10,18,.18);
      opacity:0;
      transition:.15s ease;
    }

    .stage-tap-zone.left::after{ left:6px; }
    .stage-tap-zone.right::after{ right:6px; }

    .stage-tap-zone:active::after{
      opacity:1;
    }

    .stage-tap-zone .tap-arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:rgba(255,255,255,.75);
      font-size:22px;
      font-weight:700;
      opacity:0;
      pointer-events:none;
      display:none;
    }

    .stage-tap-zone.left .tap-arrow{ left:14px; }
    .stage-tap-zone.right .tap-arrow{ right:14px; }

    .top-home-btn{
      display:none;
    }

    .firebase-status{
      min-width:0;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
    }


.sync-room-input{
  height:42px;
  min-width:150px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:#fff;
  color:#111;
  font-size:14px;
  flex:1 1 180px;
}

.firebase-status{
  min-height:42px;
  padding:0 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:var(--sub);
  font-size:13px;
  display:inline-flex;
  align-items:center;
  white-space:nowrap;
}

.firebase-status.ok{
  color:#dffbe8;
  border-color:#2f855a;
  background:rgba(47,133,90,.18);
}

.firebase-status.error{
  color:#ffdada;
  border-color:#b84b4b;
  background:rgba(184,75,75,.16);
}

    .icon-btn,.mode-btn,.nav-btn,.playback-btn,.select-btn,.link-btn{
      border:none;
      outline:none;
      cursor:pointer;
      color:var(--text);
      background:var(--panel-2);
      border:1px solid var(--line);
      transition:.15s ease;
      border-radius:12px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .icon-btn:hover,.mode-btn:hover,.nav-btn:hover,.playback-btn:hover,.select-btn:hover,.link-btn:hover{
      transform:translateY(-1px);
      border-color:#45618d;
    }

    .icon-btn,.playback-btn,.select-btn,.link-btn{
      height:42px;
      min-width:42px;
      padding:0 12px;
      white-space:nowrap;
      font-size:14px;
    }

    .select-btn.active,
    .playback-btn.active{
      background:linear-gradient(180deg,#5f4d16,#47390f);
      border-color:var(--warning);
      color:#fff3d4;
    }

    .main{
      display:grid;
      grid-template-columns:1.35fr .9fr;
      gap:14px;
      padding:14px;
      min-height:0;
      overflow:hidden;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-height:0;
      overflow:hidden;
    }

    .viewer{
      display:flex;
      flex-direction:column;
      min-height:0;
      position:relative;
    }

    .stage{
      flex:1;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      position:relative;
      overflow:hidden;
      touch-action:pan-y pinch-zoom;
    }

    video,
    .main-image,
    .main-text{
      width:100%;
      height:100%;
      display:none;
      background:#000;
    }

    video,
    .main-image{
      object-fit:contain;
    }

    .main-image{
      user-select:none;
      -webkit-user-drag:none;
      transform-origin:center center;
      will-change:transform;
    }

    .main-image.zoomable{
      touch-action:none;
    }

    .main-image.zoomed{
      cursor:grab;
    }

    .main-text{
      display:none;
      align-items:center;
      justify-content:center;
      padding:clamp(18px,4vw,64px);
      text-align:center;
      font-weight:800;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:keep-all;
      color:#f7f9ff;
      background:
        radial-gradient(circle at 18% 20%, rgba(110,168,255,.18), transparent 28%),
        radial-gradient(circle at 82% 28%, rgba(142,240,194,.12), transparent 28%),
        linear-gradient(180deg, #0b0f17 0%, #101725 100%);
      font-size:clamp(28px,4.2vw,68px);
    }

    .overlay-msg{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,.74);
      color:#fff;
      border:1px solid rgba(255,255,255,.15);
      padding:12px 16px;
      border-radius:12px;
      font-size:16px;
      z-index:60;
      display:none;
      text-align:center;
      max-width:min(84vw, 900px);
      line-height:1.7;
      white-space:pre-wrap;
      word-break:keep-all;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    .drop-hint{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.45);
      color:#e8f0ff;
      font-size:18px;
      font-weight:700;
      z-index:55;
      pointer-events:none;
      opacity:0;
      transition:opacity .15s ease;
      text-align:center;
      padding:24px;
      line-height:1.6;
    }

    .drop-hint.show{
      opacity:1;
    }

    .viewer-bottom{
      /* hide bottom preview images in non-fullscreen to only show a single active panel */
      display:none;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
      border-top:1px solid var(--line);
      background:var(--panel);
    }

    .img-box{
      min-height:126px;
      background:#0d1118;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .img-box img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
    }

    .img-label{
      position:absolute;
      left:10px;
      top:10px;
      font-size:12px;
      color:#d7e2f7;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
      padding:4px 8px;
      border-radius:999px;
    }

    .info{
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .info-scroll{
      flex:1;
      overflow:auto;
      padding:18px 18px 14px;
      -webkit-overflow-scrolling:touch;
    }

    .info-scroll::-webkit-scrollbar{width:10px;}
    .info-scroll::-webkit-scrollbar-thumb{
      background:#2a3445;
      border-radius:999px;
      border:2px solid transparent;
      background-clip:padding-box;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .word{
      font-size:30px;
      font-weight:800;
      line-height:1.15;
      margin:0;
      word-break:keep-all;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      background:var(--panel-2);
      border:1px solid var(--line);
      color:var(--sub);
      font-size:13px;
    }

    .section{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      background:var(--panel);
      border:1px solid var(--line);
    }

    .section h3{
      margin:0 0 10px;
      font-size:15px;
      color:#cfe0ff;
    }

    .section .content{
      font-size:15px;
      line-height:1.7;
      color:#f4f7ff;
      word-break:keep-all;
      white-space:pre-wrap;
    }

    .selection-panel{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .selection-top{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .selection-search-wrap{
      position:relative;
      flex:1;
      min-width:220px;
    }

    .selection-search{
      width:100%;
      height:40px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 12px;
      background:#fff;
      color:#111;
      font-size:14px;
    }

    .selection-suggestions{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      background:#fff;
      color:#111;
      border-radius:14px;
      box-shadow:0 18px 40px rgba(0,0,0,.32);
      overflow:auto;
      display:none;
      max-height:320px;
      z-index:9999;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .selection-suggestions.open{
      display:block;
    }

    .preset-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .preset-input,
    .preset-select{
      height:38px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 10px;
      background:#fff;
      color:#111;
      font-size:14px;
    }

    .preset-input{
      min-width:140px;
      flex:1;
    }

    .preset-select{
      min-width:140px;
      flex:1;
    }

    .selected-chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-height:22px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#20324a;
      border:1px solid #3b5d88;
      color:#edf4ff;
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .chip:active{
      transform:scale(.98);
      background:#294061;
    }

    .chip button{
      border:none;
      background:none;
      color:#cfe0ff;
      cursor:pointer;
      font-size:14px;
      padding:0;
      line-height:1;
      pointer-events:none;
    }

    .footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 14px;
      border-top:1px solid var(--line);
      background:rgba(10,13,18,.94);
      backdrop-filter:blur(10px);
    }

    .nav-group,.mode-group,.extra-group{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
    }

    .nav-btn{
      min-width:56px;
      height:46px;
      border-radius:14px;
      font-size:18px;
      padding:0 14px;
    }

    .mode-btn{
      min-width:42px;
      height:46px;
      border-radius:14px;
      padding:0 10px;
      font-weight:700;
      font-size:14px;
    }

    .mode-btn.active{
      background:linear-gradient(180deg, #2b4f8d, #224073);
      border-color:#6ea8ff;
    }

    .status{
      /* 설명 텍스트를 항상 숨깁니다. 홈 버튼과 모드 버튼 사이에 여백이 생기지 않도록 display:none 처리 */
      display:none;
      color:var(--sub);
      font-size:13px;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:center;
      flex:1;
    }

    .empty{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      text-align:center;
      color:var(--sub);
      padding:20px;
      line-height:1.8;
    }

    .mobile-sheet{
      position:fixed;
      left:0;
      right:0;
      bottom:72px;
      max-height:60vh;
      background:#0f141d;
      border-top-left-radius:20px;
      border-top-right-radius:20px;
      border:1px solid var(--line);
      box-shadow:0 -10px 30px rgba(0,0,0,.35);
      transform:translateY(110%);
      transition:.22s ease;
      z-index:160;
      overflow:hidden;
      display:none;
    }

    .mobile-sheet.open{
      transform:translateY(0);
    }

    .mobile-list-btn{
      width:100%;
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      text-align:left;
      padding:10px 12px;
      margin-bottom:8px;
    }

    .mobile-list-btn.active{
      border-color:var(--accent);
      background:rgba(110,168,255,.15);
    }

    .mobile-sheet-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#111826;
    }

    .mobile-sheet-body{
      overflow:auto;
      max-height:calc(60vh - 56px);
      padding:12px 14px 18px;
    }

    .sheet-handle{
      width:54px;
      height:5px;
      background:#47546a;
      border-radius:999px;
      margin:0 auto 8px;
    }

    .desktop-only{display:inline-flex;}
    .mobile-only{display:none;}

    @media (max-width: 1180px){
      .main{
        grid-template-columns:1fr;
      }
      .info{
        display:none;
      }
      .viewer-bottom{
        display:none;
      }
      .desktop-only{display:none;}
      .mobile-only{display:inline-flex;}
      .quick-btn,
      .top-home-btn,
      .stage-tap-zone{
        display:none;
      }
    }

    @media (max-width: 760px){
      :root{
        --header-h:auto;
        --footer-h:auto;
      }

      .header{
        padding:8px 8px 6px;
        gap:6px;
      }

      .header-row{
        gap:6px;
      }

      .header-row-search{
        flex-wrap:nowrap;
        align-items:center;
      }

      .header-row-search .search-wrap{
        flex:1 1 auto;
        min-width:0;
      }

      .search{
        height:40px;
        padding:0 11px;
        font-size:14px;
      }

      .search-wrap{
        min-width:0;
      }

      .scope-select,
      .category-select{
        display:none;
      }

      .quick-btn,
      .top-home-btn{
        display:inline-flex;
      }

      .quick-btn{
        min-width:0;
        padding:0 10px;
        font-size:12px;
        flex:0 0 auto;
      }

      .count-badge{
        min-width:58px;
        height:40px;
        font-size:12px;
        padding:0 4px;
      }

      .header-row-actions{
        flex-wrap:wrap;
      }

      .header-row-actions .icon-btn,
      .header-row-actions .select-btn,
      .header-row-actions .playback-btn{
        height:38px;
        min-width:38px;
        padding:0 9px;
        font-size:12px;
      }

      .header-row-sync{
        flex-wrap:nowrap;
        align-items:center;
      }

      .sync-room-input{
        min-width:0;
        flex:1 1 auto;
        height:38px;
        font-size:12px;
        padding:0 10px;
      }

      .header-row-sync .icon-btn{
        height:38px;
        min-width:38px;
        padding:0 8px;
        font-size:12px;
      }

      .firebase-status{
        flex:0 0 auto;
        max-width:90px;
        min-height:38px;
        height:38px;
        padding:0 8px;
        font-size:11px;
      }

      .main{
        padding:6px;
        gap:6px;
      }

      .viewer{
        min-height:0;
      }

      .stage{
        border-radius:14px;
      }

      .stage-tap-zone{
        display:block;
      }

      .footer{
        padding:4px 8px calc(6px + env(safe-area-inset-bottom));
        align-items:stretch;
        flex-direction:column;
        gap:3px;
      }

      .nav-group{
        display:none;
      }

      .mode-group,.extra-group{
        width:100%;
      }

      .mode-group{
        display:grid;
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:6px;
      }

      .mode-btn{
        min-width:0;
        width:100%;
        height:40px;
      }

      .nav-btn{
        flex:1;
        min-width:0;
        height:40px;
      }

      .icon-btn,.playback-btn,.select-btn,.link-btn{
        height:38px;
        min-width:38px;
        padding:0 9px;
      }

      .status{
        display:none;
      }

      .main-text{
        font-size:clamp(24px, 8vw, 42px);
        padding:20px;
      }

      .word{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-row header-row-search">
        <div class="search-wrap">

    function withTimeout(promise, ms, label = "작업"){
      let timer = null;
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          timer = setTimeout(() => reject(new Error(`${label} 시간 초과`)), ms);
        })
      ]).finally(() => {
        clearTimeout(timer);
      });

    function openIDB(){
      return new Promise((resolve, reject) => {
        if (typeof indexedDB === "undefined"){
          reject(new Error("IndexedDB 미지원"));
          return;
        }

        const req = indexedDB.open(IDB_DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(IDB_STORE)){
            db.createObjectStore(IDB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("IndexedDB 오류"));
        req.onblocked = () => reject(new Error("IndexedDB blocked"));
      });
    }

    async function idbSet(key, value){
      try{
        const db = await withTimeout(openIDB(), 2500, "IndexedDB 열기");
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readwrite");
          tx.objectStore(IDB_STORE).put(value, key);
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror = () => { db.close(); reject(tx.error); };
        });
      } catch (err){
        console.warn("IndexedDB 저장 실패 - localStorage 대체 사용", err);
        safeLocalStorageSet(fallbackKey(key), JSON.stringify(value));
      }
    }

    async function idbGet(key){

        return await new Promise((resolve, reject) => {

          const req = tx.objectStore(IDB_STORE).get(key);
          req.onsuccess = () => { db.close(); resolve(req.result); };
          req.onerror = () => { db.close(); reject(req.error); };

    function safe(v){

    /**
     * 한글 호환 자모(compatibility jamo)로 분해된 문자열을 정규화하여
     * 완성형 한글(NFC)로 조합합니다. 예: 'ㅂㅕㄹ' → '별'.
     * 자모의 배열이 올바른 초성-중성-(종성) 조합을 이루지 못할 경우에는
     * 해당 문자를 그대로 반환합니다.
     * @param {string} str 입력 문자열
     * @returns {string} 조합된 문자열
     */
    function normalizeHangulString(str){
      if (!str) return "";
      // 한글 초성, 중성, 종성 표. 초성과 종성은 일부가 겹칩니다.
      const CHO = [
        "ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"
      ];
      const JUNG = [
        "ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"
      ];
      // 종성 목록에는 빈 문자열(없음) 자리도 포함되어야 합니다.
      const JONG = [
        "", "ㄱ", "ㄲ", "ㄳ", "ㄴ", "ㄵ", "ㄶ", "ㄷ", "ㄹ", "ㄺ", "ㄻ", "ㄼ", "ㄽ", "ㄾ", "ㄿ", "ㅀ", "ㅁ", "ㅂ", "ㅄ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"
      ];
      let result = "";
      let i = 0;
      const chars = Array.from(str);
      while (i < chars.length){
        const ch = chars[i];
        const choIndex = CHO.indexOf(ch);
        if (choIndex >= 0 && i + 1 < chars.length){
          const next = chars[i + 1];
          const jungIndex = JUNG.indexOf(next);
          if (jungIndex >= 0){
            // 기본적으로 종성은 없음(0)
            let jongIndex = 0;
            // 세 번째 자모를 종성으로 사용할 수 있는지 확인
            if (i + 2 < chars.length){
              const possibleJong = chars[i + 2];
              const pjIdx = JONG.indexOf(possibleJong);
              if (pjIdx > 0){
                jongIndex = pjIdx;
                i += 3;
              } else {
                i += 2;
              }
            } else {
              i += 2;
            }
            const code = 0xac00 + (choIndex * 21 * 28) + (jungIndex * 28) + jongIndex;
            result += String.fromCharCode(code);
            continue;
          }
        }
        // 자모 조합이 아니면 그대로 추가
        result += ch;
        i++;
      }
      return result;
    }

      }

    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++){
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"'){
          if (inQuotes && next === '"'){
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes){
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes){
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }

      if (cell.length || row.length){
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function csvToObjects(text){
      const matrix = parseCSV(text);
      if (!matrix.length) return [];
      const headers = matrix[0].map(h => safe(h).replace(/^\uFEFF/, ""));
      return matrix.slice(1)
        .filter(r => r.some(c => safe(c)))
        .map(r => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = safe(r[i]));
          return obj;
        });
    }

    function xlsxArrayBufferToObjects(buffer){
      const workbook = XLSX.read(buffer, { type: "array" });
      const firstSheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[firstSheetName];
      return XLSX.utils.sheet_to_json(sheet, { defval: "" });
    }

          throw new Error("XLSX 라이브러리를 불러오지 못했습니다.");
        }
        return xlsxArrayBufferToObjects(buffer);
      }
      const text = new TextDecoder("utf-8").decode(buffer);
      return csvToObjects(text);
    }

    function pickValue(obj, keys){
      for (const key of keys){
        if (safe(obj[key])) return safe(obj[key]);
      }
      return "";
    }

    function buildSourceUrl(id, rawUrl){
      const url = normalizeUrl(rawUrl);
      if (url) return url;
      if (id) return `${BASE_URL}/kslserv/sign/signWord.do?signWordId=${id}`;
      return "";
    }

    function buildGroups(dataRows){
      const byId = new Map();

      dataRows.forEach(r => {
        const id = pickValue(r, ["ID", "id", "Id"]);
        const word = pickValue(r, ["표제어", "word", "단어", "표현"]);
        if (!id || !word) return;

        if (!byId.has(id)){
          const wordNorm = normalizeHangulString(word).toLowerCase();
          byId.set(id, {
            id,
            word,
            wordNorm,
            wordSearchBlob: wordNorm,
            category: pickValue(r, ["의미범주", "카테고리", "category"]),
            sourceUrl: buildSourceUrl(id, pickValue(r, ["원문", "원문페이지", "sourceUrl", "url"])),
            wordVideo: normalizeUrl(pickValue(r, ["표제어영상", "표제어 영상", "wordVideo", "영상"])),
            wordSignImage: normalizeUrl(pickValue(r, ["표제어수어문자", "표제어 수어문자", "wordSignImage"])),
            handShapeImage: normalizeUrl(pickValue(r, ["표제어수형그림", "표제어 수형그림", "handShapeImage", "수형그림"])),
            examples: [],
            exampleNorms: [],
            exampleSearchBlob: "",
            searchBlob: wordNorm
          });
        }

        const group = byId.get(id);
        const exText = pickValue(r, ["용례번역문", "용례 번역문", "exampleText", "번역문"]);
        const exVideo = normalizeUrl(pickValue(r, ["용례영상", "용례 영상", "exampleVideo"]));
        const exSignImage = normalizeUrl(pickValue(r, ["용례수어문자", "용례 수어문자", "exampleSignImage"]));

        if (exText || exVideo || exSignImage){
          const textNorm = normalizeHangulString(exText).toLowerCase();
          const key = [exText, exVideo, exSignImage].join("||");
          if (!group.examples.some(ex => ex._key === key)){
            group.examples.push({
              text: exText,
              textNorm,
              video: exVideo,
              signImage: exSignImage,
              _key: key
            });
            if (textNorm) group.exampleNorms.push(textNorm);
          }
        }
      });

      const out = [...byId.values()].sort((a,b) => a.word.localeCompare(b.word, "ko"));
      out.forEach(group => {
        group.exampleSearchBlob = group.exampleNorms.join("\n");
        group.searchBlob = [group.wordNorm, group.exampleSearchBlob].filter(Boolean).join("\n");
      });
      return out;
    }

    function buildExamplePool(groupsData){
      const pool = [];
      groupsData.forEach(group => {
        group.examples.forEach((ex, exIdx) => {
          const wordNorm = group.wordNorm || normalizeHangulString(group.word).toLowerCase();
          const textNorm = ex.textNorm || normalizeHangulString(ex.text || "").toLowerCase();
          pool.push({
            groupId: group.id,
            word: group.word,
            wordNorm,
            category: group.category,
            sourceUrl: group.sourceUrl,
            groupWordVideo: group.wordVideo,
            groupWordSignImage: group.wordSignImage,
            groupHandShapeImage: group.handShapeImage,
            exampleIndex: exIdx,
            text: ex.text || "",
            textNorm,
            searchBlob: [wordNorm, textNorm].filter(Boolean).join("\n"),
            video: ex.video || "",
            signImage: ex.signImage || ""
          });
        });
      });
      return pool;
    }

    function rebuildFastIndexes(){
      groupById = new Map(groups.map(g => [String(g.id), g]));

      groupsByCategory = new Map();
      examplesByCategory = new Map();
      groupsByCategory.set("", groups);
      examplesByCategory.set("", examplePool);

      groups.forEach(g => {
        const key = safe(g.category);
        if (!groupsByCategory.has(key)) groupsByCategory.set(key, []);
        groupsByCategory.get(key).push(g);
      });

      examplePool.forEach(item => {
        const key = safe(item.category);
        if (!examplesByCategory.has(key)) examplesByCategory.set(key, []);
        examplesByCategory.get(key).push(item);
      });

      wordSuggestionIndex = groups.map(g => ({
        type: "word",
        text: g.word,
        word: g.word,
        id: g.id,
        norm: g.wordNorm,
        len: g.word.length
      }));

      exampleSuggestionIndex = examplePool.map(item => ({
        type: "example",
        text: item.text,
        word: item.word,
        id: item.groupId,
        norm: item.textNorm || "",
        len: (item.text || "").length || item.word.length,
        textLen: (item.text || "").length
      }));
    }

    function buildBalancedExamplePool(items){
      const map = new Map();
      items.forEach(item => {
        if (!map.has(item.word)) map.set(item.word, []);
        map.get(item.word).push(item);
      });

      const words = [...map.keys()].sort((a,b) => a.localeCompare(b, "ko"));
      const queues = words.map(word => [...map.get(word)]);
      const result = [];

      let added = true;
      while (added){
        added = false;
        for (const q of queues){
          if (q.length){
            result.push(q.shift());
            added = true;
          }
        }
      }
      return result;
    }

    function clamp(value, min, max){
      return Math.min(max, Math.max(min, value));
    }

    function canUseImageZoom(){
      return isMobileViewport()
        && currentMode === "D"
        && els.mainImage
        && els.mainImage.style.display !== "none"
        && !!els.mainImage.getAttribute("src");
    }

    function getRenderedImageMetrics(){
      const stageRect = els.stage.getBoundingClientRect();
      const naturalW = els.mainImage.naturalWidth || stageRect.width || 1;
      const naturalH = els.mainImage.naturalHeight || stageRect.height || 1;
      const scale = Math.min(stageRect.width / naturalW, stageRect.height / naturalH) || 1;
      const drawWidth = naturalW * scale;
      const drawHeight = naturalH * scale;
      return { stageRect, drawWidth, drawHeight };
    }

    function clampImageOffset(x, y, scale = imageZoom.scale){
      const { drawWidth, drawHeight } = getRenderedImageMetrics();
      const maxX = Math.max(0, (drawWidth * scale - drawWidth) / 2);
      const maxY = Math.max(0, (drawHeight * scale - drawHeight) / 2);
      return {
        x: clamp(x, -maxX, maxX),
        y: clamp(y, -maxY, maxY)
      };
    }

    function isImageGestureActive(){
      return canUseImageZoom() && (imageZoom.scale > 1.01 || imageZoom.panning || imageZoom.pinching);
    }

    function updateStageGestureState(){
      const disableTapZones = isMobileViewport() && currentMode === "D" && !!els.mainImage.getAttribute("src");
      [els.tapPrevZone, els.tapNextZone].forEach(zone => {
        if (!zone) return;
        zone.style.pointerEvents = disableTapZones ? "none" : "auto";
        zone.style.opacity = disableTapZones ? "0" : "1";
      });
    }

    function applyImageZoom(){
      if (!canUseImageZoom()){
        imageZoom.scale = 1;
        imageZoom.x = 0;
        imageZoom.y = 0;
        imageZoom.panning = false;
        imageZoom.pinching = false;
        imageZoom.moved = false;
        els.mainImage.classList.remove("zoomable", "zoomed");
        els.mainImage.style.transform = "translate3d(0,0,0) scale(1)";
        updateStageGestureState();
        return;
      }

      els.mainImage.classList.add("zoomable");
      if (imageZoom.scale <= 1.01){
        imageZoom.scale = 1;
        imageZoom.x = 0;
        imageZoom.y = 0;
        els.mainImage.classList.remove("zoomed");
        els.mainImage.style.transform = "translate3d(0,0,0) scale(1)";
      } else {
        const clamped = clampImageOffset(imageZoom.x, imageZoom.y, imageZoom.scale);
        imageZoom.x = clamped.x;
        imageZoom.y = clamped.y;
        els.mainImage.classList.add("zoomed");
        els.mainImage.style.transform = `translate3d(${imageZoom.x}px, ${imageZoom.y}px, 0) scale(${imageZoom.scale})`;
      }
      updateStageGestureState();
    }

    function resetImageZoom(){
      imageZoom.scale = 1;
      imageZoom.x = 0;
      imageZoom.y = 0;
      imageZoom.panning = false;
      imageZoom.pinching = false;
      imageZoom.moved = false;
      applyImageZoom();
    }

    function zoomImageAt(scale, clientX, clientY){
      if (!canUseImageZoom()) return;
      const nextScale = clamp(scale, imageZoom.min, imageZoom.max);
      if (nextScale <= 1.01){
        resetImageZoom();
        return;
      }
      const { stageRect } = getRenderedImageMetrics();
      const centerX = stageRect.left + stageRect.width / 2;
      const centerY = stageRect.top + stageRect.height / 2;
      imageZoom.scale = nextScale;
      imageZoom.x = (centerX - clientX) * (nextScale - 1);
      imageZoom.y = (centerY - clientY) * (nextScale - 1);
      applyImageZoom();
    }

    function touchDistance(t1, t2){
      return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }

    function applyRestoredUIState(state){
      if (!state) return;
      if (state.currentMode && MODES[state.currentMode]) currentMode = state.currentMode;
      if (typeof state.currentIndex === "number") currentIndex = state.currentIndex;
      if (typeof state.currentPoolIndex === "number") currentPoolIndex = state.currentPoolIndex;
      if (state.playbackMode && PLAYBACK_MODES.includes(state.playbackMode)) playbackMode = state.playbackMode;
      if (Array.isArray(state.selectedGroupIds)){

      if (typeof state.searchValue === "string") els.searchInput.value = state.searchValue;
      if (typeof state.searchScope === "string") els.searchScopeSelect.value = state.searchScope;
      if (!["word", "example", "all"].includes(els.searchScopeSelect.value)) els.searchScopeSelect.value = "word";
      updateSearchPlaceholder();
      if (state.selectionPresets && typeof state.selectionPresets === "object" && !Array.isArray(state.selectionPresets)){

          Array.isArray(ids) ? ids.slice(0, 30).map(v => safe(v)).filter(Boolean) : []
        ]));
      }
      if (typeof state.presetNameValue === "string") presetNameValue = state.presetNameValue;
      if (typeof state.selectedPresetName === "string") selectedPresetName = state.selectedPresetName;
      if (typeof state.currentVideoTime === "number") currentVideoTime = state.currentVideoTime;

    function updateCategoryOptions(){

      const current = els.categorySelect.value;

    function compareSuggestionItems(a, b){
      const aDisplayLen = (a.type === "word" ? safe(a.word).length : safe(a.text).length) || a.len || 0;
      const bDisplayLen = (b.type === "word" ? safe(b.word).length : safe(b.text).length) || b.len || 0;
      return (aDisplayLen - bDisplayLen)
        || (a.score - b.score)
        || (((a.textLen ?? a.len) - (b.textLen ?? b.len)))
        || safe(a.word || a.text).localeCompare(safe(b.word || b.text), "ko")
        || safe(a.text).localeCompare(safe(b.text), "ko")
        || (a.type === b.type ? 0 : (a.type === "word" ? -1 : 1));
    }

    function isMobileViewport(){
      return window.matchMedia("(max-width: 760px)").matches;

    function updateQuickButtons(){
      if (els.searchScopeQuickBtn){
        const labelMap = { word: "표제어", example: "용례", all: "통합" };
        els.searchScopeQuickBtn.textContent = labelMap[getSearchScope()] || "표제어";
      }
      if (els.categoryQuickBtn){

        els.categoryQuickBtn.textContent = categoryLabel.length > 6 ? `${categoryLabel.slice(0, 6)}…` : categoryLabel;
        els.categoryQuickBtn.title = categoryLabel || "전체 카테고리";

    function findPreviewExampleByGroupId(groupId, preferredText = ""){
      const key = String(groupId || "");
      if (!key) return null;
      if (preferredText){
        return examplePool.find(ex => String(ex.groupId) === key && ex.text === preferredText) || null;
      }
      return examplePool.find(ex => String(ex.groupId) === key) || null;
    }

    function previewSuggestionItem(item){
      if (!item) return;
      isSearchPreviewing = true;

      const group = groupById.get(String(item.id || "")) || null;
      const example = item.type === "example"
        ? findPreviewExampleByGroupId(item.id, item.text)
        : findPreviewExampleByGroupId(item.id);
      const labelWord = group?.word || item.word || "";
      const modeLabel = MODES[currentMode] || currentMode;

      if (currentMode === "Q"){
        showMainText(labelWord || item.text || "");
      } else if (currentMode === "W"){
        if (group?.wordVideo) showMainVideo(group.wordVideo, false);
        else showMainText(labelWord || item.text || "");
      } else if (currentMode === "E"){
        if (group?.wordSignImage) showMainImage(group.wordSignImage, "표제어 수어문자");
        else showMainText(labelWord || item.text || "");
      } else if (currentMode === "G"){
        if (group?.handShapeImage) showMainImage(group.handShapeImage, "표제어 수형그림");
        else showMainText(labelWord || item.text || "");
      } else if (currentMode === "A"){
        showMainText(example?.text || item.text || labelWord || "");
      } else if (currentMode === "S"){
        if (example?.video) showMainVideo(example.video, false);
        else if (group?.wordVideo) showMainVideo(group.wordVideo, false);
        else showMainText(example?.text || item.text || labelWord || "");
      } else if (currentMode === "D"){
        if (example?.signImage) showMainImage(example.signImage, "용례 수어문자");
        else if (group?.wordSignImage) showMainImage(group.wordSignImage, "표제어 수어문자");
        else showMainText(example?.text || item.text || labelWord || "");
      }

      setImage(els.wordSignImg, group?.wordSignImage || "", "표제어 수어문자");
      setImage(els.handShapeImg, group?.handShapeImage || "", "수형그림");
      els.statusText.textContent = `미리보기 | ${labelWord || item.text || ""} | ${modeLabel}`;
    }

    function sortFilteredGroupsByWordLength(list){
      list.sort((a, b) => (a.word.length - b.word.length)
        || a.word.localeCompare(b.word, "ko")
        || String(a.id).localeCompare(String(b.id), "ko"));
      return list;
    }

    function sortFilteredExamplesByWordLength(list){
      list.sort((a, b) => (a.word.length - b.word.length)
        || ((a.text || "").length - (b.text || "").length)
        || a.word.localeCompare(b.word, "ko")
        || String(a.groupId).localeCompare(String(b.groupId), "ko"));
      return list;
    }

    function matchesGroupQuery(group, qNorm, scope){
      if (!qNorm) return true;
      if (scope === "word"){
        return exactMatch ? group.wordNorm === qNorm : group.wordNorm.includes(qNorm);
      }
      if (scope === "example"){
        return exactMatch
          ? group.exampleNorms.some(norm => norm === qNorm)
          : group.exampleSearchBlob.includes(qNorm);
      }
      return exactMatch ? (group.wordNorm === qNorm || group.exampleNorms.some(norm => norm === qNorm)) : group.searchBlob.includes(qNorm);
    }

    function matchesExampleQuery(item, qNorm, scope){
      if (!qNorm) return true;
      if (scope === "word") return exactMatch ? item.wordNorm === qNorm : item.wordNorm.includes(qNorm);
      if (scope === "example") return exactMatch ? item.textNorm === qNorm : item.textNorm.includes(qNorm);
      return exactMatch ? (item.wordNorm === qNorm || item.textNorm === qNorm) : item.searchBlob.includes(qNorm);
    }

    async function applyFilter(){
      const q = safe(els.searchInput.value).toLowerCase();
      const qNorm = q ? normalizeHangulString(q).toLowerCase() : "";
      const cat = safe(els.categorySelect.value);
      const scope = getSearchScope();
      const selectionSet = selectionModeActive ? getSelectionWordSet() : null;

      const groupBase = groupsByCategory.get(cat) || [];
      const exampleBase = examplesByCategory.get(cat) || [];

      filteredGroups = [];
      for (const g of groupBase){
        if (selectionSet && !selectionSet.has(g.id)) continue;
        if (!matchesGroupQuery(g, qNorm, scope)) continue;
        filteredGroups.push(g);
      }
      if (qNorm) sortFilteredGroupsByWordLength(filteredGroups);

      const exampleCandidates = [];
      for (const item of exampleBase){
        if (selectionSet && !selectionSet.has(item.groupId)) continue;
        if (!matchesExampleQuery(item, qNorm, scope)) continue;
        exampleCandidates.push(item);
      }
      if (qNorm) sortFilteredExamplesByWordLength(exampleCandidates);

      filteredExamplePool = selectionModeActive ? buildBalancedExamplePool(exampleCandidates) : exampleCandidates;

      if (currentIndex >= filteredGroups.length) currentIndex = 0;
      if (currentPoolIndex >= filteredExamplePool.length) currentPoolIndex = 0;

      updateCount();
      render();
      await saveState();
    }

    function renderMainStage(autoPlay = false){
      resetImageZoom();
      // 항상 뷰어 하단 영역을 숨겨 하나의 화면만 표시합니다.
      if (els.viewerBottom) {
        els.viewerBottom.style.display = "none";
      }

      if (isExampleMode()){
        const item = getCurrentPoolItem();
        if (!item){
          showMainText("검색 결과가 없습니다.");
          setImage(els.wordSignImg, "", "");
          setImage(els.handShapeImg, "", "");
          return;
        }

        if (currentMode === "A"){
          showMainText(item.text || "(용례번역문 없음)");
        } else if (currentMode === "S"){
          showMainVideo(item.video || "", true);
        } else if (currentMode === "D"){

function sanitizeRoomKey(value){
  const cleaned = safe(value)
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 40);
  return cleaned || FIREBASE_DEFAULT_ROOM;
}

function roomBasePath(room = syncRoomKey){

}

function makeDataHash(text){
  let hash = 2166136261;
  for (let i = 0; i < text.length; i++){
    hash ^= text.charCodeAt(i);
    hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
  }
  return (hash >>> 0).toString(16).padStart(8, "0");
}

function updateFirebaseStatus(text, tone = "normal"){
  if (!els.firebaseStatus) return;
  const fullText = safe(text) || "대기중";
  const now = Date.now();
  if (fullText === lastFirebaseStatusText && tone === lastFirebaseStatusTone && (now - lastFirebaseStatusAt) < 1200) return;

  const mobileShort = (() => {
    if (/연결됨|연결 완료/i.test(fullText)) return "연결됨";
    if (/오프라인/i.test(fullText)) return "오프라인";
    if (/업로드 중|동기화 중/i.test(fullText)) return "동기화중";
    if (/업로드 완료/i.test(fullText)) return "업로드됨";
    if (/최신/i.test(fullText)) return "최신";
    if (/로그인/i.test(fullText)) return "로그인";
    if (/실패|오류|제한|필요/i.test(fullText)) return "오류";
    if (/방 전환/i.test(fullText)) return "전환중";
    if (/대기/i.test(fullText)) return "대기중";
    return fullText.length > 7 ? `${fullText.slice(0, 7)}…` : fullText;
  })();
  els.firebaseStatus.textContent = isMobileViewport() ? mobileShort : fullText;
  els.firebaseStatus.title = fullText;
  els.firebaseStatus.classList.remove("ok", "error");
  if (tone === "ok") els.firebaseStatus.classList.add("ok");
  if (tone === "error") els.firebaseStatus.classList.add("error");
  lastFirebaseStatusText = fullText;
  lastFirebaseStatusTone = tone;
  lastFirebaseStatusAt = now;
}

function scheduleFirebaseStatePush(payload = null, immediate = false){
  if (!firebaseReady || !firebaseUid || isApplyingRemoteState || isApplyingRemoteDataset) return;
  clearTimeout(pendingFirebaseStateTimer);
  pendingFirebaseStateTimer = setTimeout(() => {
    pushStateToFirebase(payload).catch(err => {
      console.error("Firebase 상태 업로드 실패", err);
      updateFirebaseStatus("상태 동기화 실패", "error");
    });
  }, immediate ? 0 : 180);
}

async function pushStateToFirebase(payload = null){
  if (!firebaseReady || !firebaseUid || isApplyingRemoteState || isApplyingRemoteDataset) return;
  const statePayload = payload || buildStatePayload();
  const signature = JSON.stringify(statePayload);
  if (signature === lastPushedStateSignature) return;

  await dbSet(dbRef(firebaseDb, `${roomBasePath()}/sharedState`), {
    updatedAt: Date.now(),
    updatedBy: firebaseUid,
    payload: statePayload
  });

  lastPushedStateSignature = signature;
  if (!/연결됨/.test(els.firebaseStatus?.title || "")) updateFirebaseStatus(`실시간 연결됨 · ${syncRoomKey}`, "ok");
}

function scheduleFirebaseDatasetUpload(reason = "manual", immediate = false){

  clearTimeout(pendingFirebaseDatasetTimer);
  pendingFirebaseDatasetTimer = setTimeout(() => {
    uploadCurrentDatasetToFirebase(reason).catch(err => {

      updateFirebaseStatus("클라우드 업로드 실패", "error");
      showOverlay("Firebase 업로드 실패", 1500);

}

async function uploadCurrentDatasetToFirebase(reason = "manual"){
  if (!firebaseReady){
    updateFirebaseStatus("Firebase 연결 대기중", "error");
    showOverlay("Firebase가 아직 준비되지 않았습니다", 1400);
    return;
  }
  if (!firebaseUid){
    updateFirebaseStatus("로그인 대기중", "error");
    showOverlay("익명 로그인 완료 후 다시 시도해 주세요", 1400);
    return;
  }
  if (!rows.length){
    updateFirebaseStatus("업로드할 데이터 없음", "error");
    showOverlay("업로드할 데이터가 없습니다", 1200);
    return;
  }
  if (isApplyingRemoteDataset){
    updateFirebaseStatus("원격 데이터 적용 중...");
    return;
  }

  const json = JSON.stringify(rows);
  const hash = makeDataHash(json);
  if (hash === lastUploadedDatasetHash && remoteDatasetAvailable){
    updateFirebaseStatus(`이미 최신 데이터 업로드됨 · ${syncRoomKey}`, "ok");
    showOverlay("이미 최신 클라우드 데이터입니다", 1000);
    return;
  }

  updateFirebaseStatus("클라우드 업로드 중...", "ok");

  const version = `${Date.now()}-${firebaseUid.slice(0, 8)}-${hash}`;
  const payload = {
    version,
    sourceName: currentSourceName || "firebase-data.json",
    rowsCount: rows.length,
    uploadedAt: Date.now(),
    uploadedBy: firebaseUid,
    hash,
    reason,
    rows
  };

  await withTimeout(dbSet(dbRef(firebaseDb, `${roomBasePath()}/datasetMeta`), payload), 20000, "Realtime Database 데이터 저장");

  remoteDatasetAvailable = true;
  lastUploadedDatasetHash = hash;
  lastAppliedRemoteDatasetVersion = version;
  updateFirebaseStatus(`업로드 완료 · ${syncRoomKey}`, "ok");
  showOverlay("Realtime Database 업로드 완료", 1000);
}

async function applyRemoteDatasetMeta(meta, options = {}){
  const { silent = false } = options;
  remoteDatasetAvailable = !!(meta && Array.isArray(meta.rows));

  if (!meta || !Array.isArray(meta.rows) || !meta.version) return false;
  if (meta.version === lastAppliedRemoteDatasetVersion) return false;

  if (meta.uploadedBy === firebaseUid && meta.hash && meta.hash === lastUploadedDatasetHash){
    lastAppliedRemoteDatasetVersion = meta.version;
    return false;
  }

  try{
    updateFirebaseStatus("클라우드 데이터 동기화 중...", "ok");
    const dataRows = Array.isArray(meta.rows) ? meta.rows : [];

    isApplyingRemoteDataset = true;
    try{
      await finalizeLoadedData(dataRows, meta.sourceName || "Realtime Database 데이터", true, true);
    } finally {
      isApplyingRemoteDataset = false;
    }

    lastAppliedRemoteDatasetVersion = meta.version;
    if (meta.hash) lastUploadedDatasetHash = meta.hash;
    updateFirebaseStatus(`실시간 연결됨 · ${syncRoomKey}`, "ok");
    if (!silent) showOverlay(`최신 데이터 적용\n${meta.sourceName || "firebase-data.json"}`, 1400);
    return true;
  } catch (err){
    console.error("Firebase 원격 데이터 적용 실패", err);
    updateFirebaseStatus("원격 데이터 불러오기 실패", "error");
    if (!silent) showOverlay("Firebase 데이터 적용 실패", 1500);
    return false;
  }
}

async function applyRemoteStateEnvelope(envelope, options = {}){
  const { silent = false } = options;
  const payload = envelope?.payload || envelope;
  if (!payload) return false;

  const signature = JSON.stringify(payload);
  if (envelope?.updatedBy === firebaseUid && signature === lastPushedStateSignature) return false;
  if (signature === lastAppliedRemoteStateSignature) return false;

  lastAppliedRemoteStateSignature = signature;

  isApplyingRemoteState = true;
  try{
    await idbSet(CACHE_KEYS.STATE, payload);
    await idbSet(`${CACHE_KEYS.STATE}:${syncRoomKey}`, payload);
    applyRestoredUIState(payload);
    updateExactMatchButton();
    await applyFilter();
    render(false);
  } finally {
    isApplyingRemoteState = false;
  }

  return true;
}

function cleanupFirebaseWatchers(){
  if (firebaseStateUnsub){ try { firebaseStateUnsub(); } catch {} firebaseStateUnsub = null; }
  if (firebaseMetaUnsub){ try { firebaseMetaUnsub(); } catch {} firebaseMetaUnsub = null; }
  if (firebaseConnectionUnsub){ try { firebaseConnectionUnsub(); } catch {} firebaseConnectionUnsub = null; }
}

function startFirebaseLiveWatchers(){
  if (!firebaseReady) return;
  cleanupFirebaseWatchers();

  const stateRef = dbRef(firebaseDb, `${roomBasePath()}/sharedState`);
  const metaRef = dbRef(firebaseDb, `${roomBasePath()}/datasetMeta`);
  const connectedRef = dbRef(firebaseDb, ".info/connected");

  firebaseConnectionUnsub = onValue(connectedRef, (snapshot) => {
    const connected = !!snapshot.val();
    clearTimeout(firebaseOfflineStatusTimer);
    if (connected){
      updateFirebaseStatus(`실시간 연결됨 · ${syncRoomKey}`, "ok");
    } else {
      firebaseOfflineStatusTimer = setTimeout(() => {
        updateFirebaseStatus(`오프라인 대기중 · ${syncRoomKey}`);
      }, 1200);
    }
  });

  firebaseStateUnsub = onValue(stateRef, (snapshot) => {
    const envelope = snapshot.val();
    applyRemoteStateEnvelope(envelope).catch(err => {
      console.error("실시간 상태 수신 실패", err);
    });
  });

  firebaseMetaUnsub = onValue(metaRef, (snapshot) => {
    const meta = snapshot.val();
    applyRemoteDatasetMeta(meta).catch(err => {
      console.error("실시간 데이터 수신 실패", err);
    });
  });
}

async function loadInitialFirebaseSnapshot(){
  if (!firebaseReady) return false;

  try{
    const [metaSnap, stateSnap] = await Promise.all([
      dbGet(dbRef(firebaseDb, `${roomBasePath()}/datasetMeta`)),
      dbGet(dbRef(firebaseDb, `${roomBasePath()}/sharedState`))
    ]);

    let loaded = false;

    if (metaSnap.exists()){
      const metaVal = metaSnap.val();
      remoteDatasetAvailable = !!(metaVal && Array.isArray(metaVal.rows));
      loaded = await applyRemoteDatasetMeta(metaVal, { silent: true });
    }

    if (stateSnap.exists()){
      await applyRemoteStateEnvelope(stateSnap.val(), { silent: true });
    }

    startFirebaseLiveWatchers();
    return loaded;
  } catch (err){
    console.warn("Firebase 초기 스냅샷 복원 실패", err);
    updateFirebaseStatus("Firebase 초기 데이터 확인 실패", "error");
    startFirebaseLiveWatchers();
    return false;
  }
}

async function reconnectFirebaseRoom(){

  syncRoomKey = sanitizeRoomKey(els.syncRoomInput.value);

  remoteDatasetAvailable = false;

}

    function getSearchSuggestions(){
      const qRaw = safe(els.searchInput.value).toLowerCase();
      const scope = getSearchScope();
      if (!qRaw) return [];
      const qNorm = normalizeHangulString(qRaw).toLowerCase();
      const cap = 80;

      const getWordMatches = () => {
        const list = [];
        for (const item of wordSuggestionIndex){
          const norm = item.norm || "";
          if (!norm || !norm.includes(qNorm)) continue;
          list.push({ ...item, score: scoreSuggestion(norm, qNorm, item.text) });
          if (list.length >= cap * 4) break;
        }
        list.sort(compareSuggestionItems);
        return list;
      };

      const getExampleMatches = () => {
        const list = [];
        const seen = new Set();
        for (const item of exampleSuggestionIndex){
          const norm = item.norm || "";
          if (!norm || !norm.includes(qNorm) || seen.has(`${item.id}::${item.text}`)) continue;
          seen.add(`${item.id}::${item.text}`);
          list.push({ ...item, score: scoreSuggestion(norm, qNorm, item.text) });
          if (list.length >= cap * 4) break;
        }
        list.sort(compareSuggestionItems);
        return list;
      };

      if (scope === "word"){
        return getWordMatches().slice(0, cap);
      }
      if (scope === "example"){
        return getExampleMatches().slice(0, cap);
      }

      return [...getWordMatches(), ...getExampleMatches()]
        .sort(compareSuggestionItems)
        .slice(0, cap);
    }

    function applySuggestionPick(item){
      if (!item) return;
      const suggestionValue = item.type === "word" ? item.word : item.text;
      els.searchInput.value = suggestionValue;
      els.searchInput.blur();
      els.searchSuggestions.classList.remove("open");
      els.searchSuggestions.innerHTML = "";

      restoreSearchPreview();
      Promise.resolve(applyFilter()).then(() => {
        if (item.type === "word" && item.id){
          const idx = filteredGroups.findIndex(g => String(g.id) === String(item.id));
          if (idx >= 0){
            currentIndex = idx;

              els.modeBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === currentMode));

          }

    function renderSearchSuggestions(){
      const items = getSearchSuggestions();
      if (!items.length || document.activeElement !== els.searchInput){
        els.searchSuggestions.classList.remove("open");
        els.searchSuggestions.innerHTML = "";
        searchFocusedIndex = -1;
        return;
      }

      if (searchFocusedIndex >= items.length) searchFocusedIndex = items.length - 1;
      const html = items.map((item, idx) => {
        let displayText = item.text;
        if (item.type === "word"){
          displayText = duplicateWords.has(item.word) ? `${item.word} (ID:${item.id})` : item.word;
        }
        const wordDisplay = duplicateWords.has(item.word) ? `${item.word} (ID:${item.id})` : item.word;
        return `
          <div class="suggestion-item ${idx === searchFocusedIndex ? "active" : ""}" data-idx="${idx}">
            ${escapeHtml(displayText)}
            ${item.type === "example" ? `<span class="suggestion-sub">표제어: ${escapeHtml(wordDisplay)}</span>` : ``}
          </div>
        `;
      }).join("");

      els.searchSuggestions.innerHTML = html;
      els.searchSuggestions.classList.add("open");
      [...els.searchSuggestions.querySelectorAll('.suggestion-item')].forEach(el => {
        const idx = Number(el.dataset.idx);
        const item = items[idx];
        let touchMoved = false;
        const pick = () => applySuggestionPick(item);
        el.addEventListener('mouseenter', () => {
          searchFocusedIndex = idx;
          previewSuggestionItem(item);
          requestRenderSearchSuggestions();
        });
        el.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
        el.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
        el.addEventListener('touchend', (e) => {
          if (touchMoved) return;
          e.preventDefault();
          e.stopPropagation();
          pick();
        }, { passive: false });
        el.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          pick();
        });
      });

      const activeEl = els.searchSuggestions.querySelector('.suggestion-item.active');
      if (activeEl){
        activeEl.scrollIntoView({ block: 'nearest' });
      }
    }

      selectedGroupIds = [...selectionPresets[name]];
      renderInfo();
      await saveState();
      showOverlay(`선택학습 목록 불러오기 완료\n${name}`, 1200);
    }

    async function deleteSelectedPreset(){
      const name = safe(selectedPresetName);
      if (!name || !selectionPresets[name]){
        showOverlay("삭제할 목록을 선택해 주세요", 1200);
        return;
      }
      delete selectionPresets[name];
      if (selectedPresetName === name) selectedPresetName = "";
      await saveSelectionPresets();
      renderInfo();
      showOverlay(`선택학습 목록 삭제 완료\n${name}`, 1200);
    }

    function startSelectionMode(){
      if (!selectedGroupIds.length){
        showOverlay("먼저 표제어를 하나 이상 선택해 주세요", 1500);
        return;
      }
      selectionModeActive = true;
      currentIndex = 0;
      currentPoolIndex = 0;

      // 이전 검색/카테고리 조건 때문에 선택한 표제어 일부만 보이는 문제를 막습니다.
      els.searchInput.value = "";
      els.categorySelect.value = "";
      els.searchScopeSelect.value = "word";
      updateSearchPlaceholder();
      searchFocusedIndex = -1;
      els.searchSuggestions.classList.remove("open");
      els.searchSuggestions.innerHTML = "";

      els.selectionModeBtn.classList.add("active");
      els.selectionExitBtn.style.display = "inline-flex";
      Promise.resolve(applyFilter()).then(() => {
        if (isExampleMode(currentMode) && !filteredExamplePool.length && filteredGroups.length){
          currentMode = "Q";
          els.modeBtns.forEach(btn => {
            btn.classList.toggle("active", btn.dataset.mode === currentMode);
          });
          render(false);
        }
        showOverlay(`선택학습 시작
${selectedGroupIds.length}개 표제어`, 1200);
        saveState();
      });

    function stopSelectionMode(){
      selectionModeActive = false;
      els.selectionModeBtn.classList.remove("active");
      els.selectionExitBtn.style.display = "none";
      applyFilter();
      showOverlay("선택학습 종료", 1000);
      saveState();
    }

    async function cyclePlaybackMode(){
      const idx = PLAYBACK_MODES.indexOf(playbackMode);
      playbackMode = PLAYBACK_MODES[(idx + 1) % PLAYBACK_MODES.length];
      applyVideoLoopState();
      updatePlaybackButton();
      await saveState();
      showOverlay(PLAYBACK_LABELS[playbackMode], 900);
    }

    async function setMode(mode){
      const prevWasExample = isExampleMode(currentMode);
      const nextIsExample = isExampleMode(mode);

      currentMode = mode;
      els.modeBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      if (!prevWasExample && nextIsExample){
        const group = getCurrentGroup();
        if (group){
          const idx = filteredExamplePool.findIndex(item => item.groupId === group.id);
          if (idx >= 0) currentPoolIndex = idx;
        }
      } else if (prevWasExample && !nextIsExample){
        const item = getCurrentPoolItem();
        if (item){
          const idx = filteredGroups.findIndex(g => g.id === item.groupId);
          if (idx >= 0) currentIndex = idx;
        }
      }

      currentVideoTime = 0;
      render(true);
      await saveState();
    }

    async function goNext(autoPlay = false){
      currentVideoTime = 0;
      if (isExampleMode()){
        if (!filteredExamplePool.length) return;
        if (currentPoolIndex < filteredExamplePool.length - 1){
          currentPoolIndex++;
          render(autoPlay);
          await saveState();
        } else {
          showOverlay("마지막 용례입니다");
        }
        return;
      }

      if (!filteredGroups.length) return;
      if (currentIndex < filteredGroups.length - 1){
        currentIndex++;
        render(autoPlay);
        await saveState();
      } else {
        showOverlay("마지막 표제어입니다");
      }
    }

    async function goPrev(autoPlay = false){
      currentVideoTime = 0;
      if (isExampleMode()){
        if (!filteredExamplePool.length) return;
        if (currentPoolIndex > 0){
          currentPoolIndex--;
          render(autoPlay);
          await saveState();
        } else {
          showOverlay("첫 용례입니다");
        }
        return;
      }

      if (!filteredGroups.length) return;
      if (currentIndex > 0){
        currentIndex--;
        render(autoPlay);
        await saveState();
      } else {
        showOverlay("첫 표제어입니다");
      }
    }

    async function shuffleCurrentOrder(){
      currentVideoTime = 0;
      const keepMode = currentMode;

      if (isExampleMode()){
        if (filteredExamplePool.length <= 1) return;
        filteredExamplePool = shuffleArray(filteredExamplePool);
        currentPoolIndex = 0;
      } else {
        if (filteredGroups.length <= 1) return;
        filteredGroups = shuffleArray(filteredGroups);
        currentIndex = 0;
      }

      render(getShouldAutoplay());
      await saveState();
      showOverlay(`${MODES[keepMode] || "현재 모드"} 순서 섞기 완료`);
    }

    async function goHome(){
      els.searchInput.value = "";
      els.categorySelect.value = "";
      els.searchScopeSelect.value = "word";
      updateSearchPlaceholder();

      searchFocusedIndex = -1;
      selectionFocusedIndex = -1;

    function seekToPercent(n){
      if (!isVideoMode()) return;
      const v = els.mainVideo;
      if (!v.duration || !isFinite(v.duration)) return;
      const pct = Math.max(0, Math.min(9, n)) / 10;
      v.currentTime = v.duration * pct;
      currentVideoTime = v.currentTime;
      saveState();
      showOverlay(`${Math.round(pct * 100)}% 이동`, 700);
    }

    function stepFrame(dir){
      if (!isVideoMode()) return;
      const v = els.mainVideo;
      if (!isFinite(v.currentTime)) return;
      v.pause();
      v.currentTime = Math.max(0, v.currentTime + FRAME_STEP * dir);
      currentVideoTime = v.currentTime;
      saveState();
    }

    function changePlaybackRate(dir){
      if (!isVideoMode()) return;
      const v = els.mainVideo;
      const next = Math.max(0.25, Math.min(3, Math.round((v.playbackRate + dir * 0.25) * 100) / 100));
      v.playbackRate = next;
      showOverlay(`재생속도 ${next}x`, 700);
    }

    function setABStart(){
      if (!isVideoMode()) return;
      abLoopStart = els.mainVideo.currentTime;
      if (abLoopEnd !== null && abLoopEnd <= abLoopStart){

    function setABEnd(){

    }

    async function captureCurrentStage(){
      try{
        const canvas = document.createElement("canvas");
        const rect = els.stage.getBoundingClientRect();
        const width = Math.max(1, Math.round(rect.width));
        const height = Math.max(1, Math.round(rect.height));
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, width, height);

        if (els.mainText.style.display === "flex"){
          const gradient = ctx.createLinearGradient(0, 0, width, height);
          gradient.addColorStop(0, "#0b0f17");
          gradient.addColorStop(1, "#101725");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);

          const text = els.mainText.textContent || "";
          ctx.fillStyle = "#f7f9ff";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `700 ${Math.max(24, Math.floor(width / 12))}px sans-serif`;

          const lines = text.split("\n");
          const lineHeight = Math.max(42, Math.floor(width / 10));
          const totalHeight = lines.length * lineHeight;
          let y = height / 2 - totalHeight / 2 + lineHeight / 2;

          lines.forEach(line => {
            ctx.fillText(line, width / 2, y, width * 0.88);
            y += lineHeight;
          });
        } else if (els.mainImage.style.display === "block" && els.mainImage.naturalWidth){
          ctx.drawImage(els.mainImage, 0, 0, width, height);
        } else if (els.mainVideo.style.display === "block"){
          try {
            ctx.drawImage(els.mainVideo, 0, 0, width, height);
          } catch (err) {
            showOverlay("이 영상은 브라우저 보안 때문에 캡처가 제한될 수 있습니다", 1500);
            return;
          }
        } else {
          showOverlay("캡처할 화면이 없습니다", 1200);
          return;
        }

        const a = document.createElement("a");
        const now = new Date();
        const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}${String(now.getSeconds()).padStart(2,"0")}`;
        a.href = canvas.toDataURL("image/png");
        a.download = `ksl_capture_${ts}.png`;
        a.click();
        showOverlay("현재 화면 캡처 완료", 900);
      } catch (err){
        console.error(err);
        showOverlay("화면 캡처에 실패했습니다", 1400);
      }
    }

    function bindDynamicInfoEvents(container){
      const selectionSearchInput = container.querySelector('[data-role="selection-search"]');
      const selectionSuggestions = container.querySelector('[data-role="selection-suggestions"]');
      const selectionAddCurrentBtn = container.querySelector('[data-role="selection-add-current"]');
      const selectionStartBtn = container.querySelector('[data-role="selection-start"]');
      const presetNameInput = container.querySelector('[data-role="preset-name"]');
      const presetSelect = container.querySelector('[data-role="preset-select"]');
      const presetSaveBtn = container.querySelector('[data-role="preset-save"]');
      const presetLoadBtn = container.querySelector('[data-role="preset-load"]');
      const presetDeleteBtn = container.querySelector('[data-role="preset-delete"]');

      if (selectionSearchInput){
        // Update search string and refresh suggestions when user types
        selectionSearchInput.addEventListener("input", () => {
          selectionSearch = selectionSearchInput.value;
          selectionFocusedIndex = -1;
          renderInfo();
        });

        // When composition (IME) ends, normalize and update search and suggestions
        selectionSearchInput.addEventListener("compositionend", () => {
          // Normalize Hangul string to combine jamo into complete syllables
          selectionSearchInput.value = normalizeHangulString(selectionSearchInput.value);
          selectionSearch = selectionSearchInput.value;
          selectionFocusedIndex = -1;
          renderInfo();
        });

        selectionSearchInput.addEventListener("keydown", (e) => {
          const items = getSelectionSuggestions();
          if (e.key === "ArrowDown"){
            e.preventDefault();
            selectionFocusedIndex = Math.min(selectionFocusedIndex + 1, items.length - 1);
            renderInfo();
          } else if (e.key === "ArrowUp"){
            e.preventDefault();
            selectionFocusedIndex = Math.max(selectionFocusedIndex - 1, 0);
            renderInfo();
          } else if (e.key === "Enter"){
            e.preventDefault();
            if (items.length){
              const idx = Math.max(selectionFocusedIndex, 0);
              const item = items[idx];
              if (item) addSelectedGroup(item.id);
            } else if (selectionSearch.trim()){
              // Attempt to find a group matching the input exactly (normalized)
              const inputNorm = normalizeHangulString(selectionSearch.trim().toLowerCase());
              const found = groups.find(g => normalizeHangulString(g.word.toLowerCase()) === inputNorm);
              if (found){
                addSelectedGroup(found.id);
              } else {
                showOverlay("해당 표제어를 찾을 수 없습니다", 1500);
              }
            }
          }
        });
      }

      if (selectionSuggestions){
        // Bind suggestion item selection for selection mode
        [...selectionSuggestions.querySelectorAll("[data-select-id]")].forEach(el => {
          const pick = () => {
            const id = el.dataset.selectId || "";
            if (id) addSelectedGroup(id);
          };
          // Distinguish between scroll and tap
          let touchMoved = false;
          el.addEventListener("touchstart", () => {
            touchMoved = false;
          }, {passive:true});
          el.addEventListener("touchmove", () => {
            touchMoved = true;
          }, {passive:true});
          el.addEventListener("touchend", (e) => {
            if (touchMoved) return;
            e.preventDefault();
            e.stopPropagation();
            pick();
          }, { passive:false });

          el.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            pick();
          });
        });
      }

      if (selectionAddCurrentBtn){
        selectionAddCurrentBtn.addEventListener("click", () => {
          if (isExampleMode()){
            const item = getCurrentPoolItem();
            if (item) addSelectedGroup(item.groupId);
          } else {
            const group = getCurrentGroup();
            if (group) addSelectedGroup(group.id);
          }
        });
      }

      if (selectionStartBtn){
        selectionStartBtn.addEventListener("click", startSelectionMode);
      }

      if (presetNameInput){
        presetNameInput.addEventListener("input", () => {
          presetNameValue = presetNameInput.value;
          saveState();
        });
      }

      if (presetSelect){
        presetSelect.addEventListener("change", () => {
          selectedPresetName = presetSelect.value;
          saveState();
        });
      }

      if (presetSaveBtn){
        presetSaveBtn.addEventListener("click", saveCurrentSelectionPreset);
      }

      if (presetLoadBtn){
        presetLoadBtn.addEventListener("click", loadSelectedPreset);
      }

      if (presetDeleteBtn){
        presetDeleteBtn.addEventListener("click", deleteSelectedPreset);
      }

      const removeChip = (id) => {
        if (!id) return;
        removeSelectedGroup(id);
      };

      [...container.querySelectorAll("[data-chip-remove]")].forEach(el => {
        let touched = false;
        const id = el.dataset.chipRemove || el.dataset.removeId || "";
        el.addEventListener("touchend", (e) => {
          touched = true;
          e.preventDefault();
          e.stopPropagation();
          removeChip(id);
        }, { passive:false });
        el.addEventListener("click", (e) => {
          if (touched){
            touched = false;
            return;
          }
          e.preventDefault();
          e.stopPropagation();
          removeChip(id);
        });
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " "){
            e.preventDefault();
            removeChip(id);
          }
        });
      });
    }

    function renderInfo(){
      const activeEl = document.activeElement;
      const role = activeEl && activeEl.getAttribute ? activeEl.getAttribute("data-role") : "";
      const keepPresetInput = role === "preset-name";

      const prevValue = keepPresetInput ? activeEl.value : "";
      const prevStart = keepPresetInput ? activeEl.selectionStart : null;
      const prevEnd = keepPresetInput ? activeEl.selectionEnd : null;

      const html = buildInfoHtml();
      els.infoScroll.innerHTML = html;
      bindDynamicInfoEvents(els.infoScroll);

      if (mobileSheetMode === "info"){
        if (els.mobileSheetTitle) els.mobileSheetTitle.textContent = "학습 정보";
        els.mobileSheetBody.innerHTML = html;
        bindDynamicInfoEvents(els.mobileSheetBody);
      }

      els.selectionModeBtn.classList.toggle("active", selectionModeActive);
      els.selectionExitBtn.style.display = selectionModeActive ? "inline-flex" : "none";

      let selector = "";
      if (keepPresetInput) selector = '[data-role="preset-name"]';

      if (selector){
        const newInput =
          els.infoScroll.querySelector(selector) ||
          (mobileSheetMode === "info" ? els.mobileSheetBody.querySelector(selector) : null);

        if (newInput){
          newInput.focus();
          newInput.value = prevValue;
          if (prevStart !== null && prevEnd !== null){
            try {
              newInput.setSelectionRange(prevStart, prevEnd);
            } catch {}
          }
        }
      }
    }

    function renderStatus(){
      const selectionTag = selectionModeActive ? " | 선택학습" : "";
      const abTag = (abLoopStart !== null && abLoopEnd !== null)
        ? ` | AB ${abLoopStart.toFixed(1)}~${abLoopEnd.toFixed(1)}`
        : "";

      if (isExampleMode()){
        const item = getCurrentPoolItem();
        if (!item){
          els.statusText.textContent = `검색 결과가 없습니다${selectionTag}`;
          return;
        }
        els.statusText.textContent = `${item.word} | ${MODES[currentMode]} | ${currentPoolIndex + 1}/${filteredExamplePool.length} | ${item.category || "카테고리 없음"} | ${PLAYBACK_LABELS[playbackMode]}${selectionTag}${abTag}`;
        return;
      }

      const group = getCurrentGroup();
      if (!group){
        els.statusText.textContent = `파일을 불러와 주세요${selectionTag}`;
        return;
      }

      els.statusText.textContent = `${group.word} | ${MODES[currentMode]} | ${currentIndex + 1}/${filteredGroups.length} | ${group.category || "카테고리 없음"} | ${PLAYBACK_LABELS[playbackMode]}${selectionTag}${abTag}`;
    }

    function render(autoPlay = false){
      updateCount();
      renderMainStage(autoPlay);
      renderInfo();
      renderStatus();
      updatePlaybackButton();
    }

    async function finalizeLoadedData(dataRows, sourceName, autoLoaded = false, saveCacheToo = false){
      rows = dataRows;
      groups = buildGroups(rows);
      // 중복되는 단어를 파악하여 duplicateWords 세트를 구성합니다.
      duplicateWords = new Set();
      const wordCounts = {};
      groups.forEach(g => {
        const w = g.word;
        wordCounts[w] = (wordCounts[w] || 0) + 1;
      });
      Object.entries(wordCounts).forEach(([w, count]) => {
        if (count > 1) duplicateWords.add(w);
      });
      examplePool = buildExamplePool(groups);
      rebuildFastIndexes();
      currentSourceName = sourceName;

      updateCategoryOptions();

      const state = await restoreState();
      applyRestoredUIState(state);
      updateQuickButtons();

      if (saveCacheToo){
        await saveDataCache(sourceName);
      }

      await applyFilter();

      currentIndex = Math.min(currentIndex, Math.max(filteredGroups.length - 1, 0));
      currentPoolIndex = Math.min(currentPoolIndex, Math.max(filteredExamplePool.length - 1, 0));

      els.modeBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === currentMode);
      });

      if (!groups.length){
        els.statusText.textContent = "데이터 없음";
        showMainText("데이터를 찾지 못했습니다.");
        renderInfo();
        return;
      }

      pendingRestoreTime = currentVideoTime > 0 ? currentVideoTime : null;
      render(getShouldAutoplay());

      const autoText = autoLoaded ? "자동 로드 완료" : "로드 완료";
      showOverlay(`${autoText}\n${sourceName}\n표제어 ${groups.length}개\n용례 ${examplePool.length}개`, 1700);
      await saveState();
    }

    async function loadFromFileObject(file){
      if (!file) return;

      const lower = file.name.toLowerCase();
      if (!lower.endsWith(".csv") && !lower.endsWith(".xlsx")){
        showOverlay("CSV 또는 XLSX 파일만 불러올 수 있습니다", 1800);
        return;
      }

      els.statusText.textContent = "파일 읽는 중...";
      const buffer = await file.arrayBuffer();
      const dataRows = await parseFileByNameAndBuffer(file.name, buffer);
      await finalizeLoadedData(dataRows, file.name, false, true);
      scheduleFirebaseDatasetUpload("manual-file", true);
    }

    async function tryAutoLoadDefaultFile(){
      try{
        els.statusText.textContent = `기본 파일 자동 불러오기 시도 중: ${DEFAULT_FILENAME}`;
        const res = await fetch(DEFAULT_FILENAME);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buffer = await res.arrayBuffer();
        const dataRows = await parseFileByNameAndBuffer(DEFAULT_FILENAME, buffer);
        await finalizeLoadedData(dataRows, DEFAULT_FILENAME, true, true);
        return true;
      } catch (err){
        console.warn("기본 파일 자동 불러오기 실패:", err);
        return false;
      }
    }

    async function tryRestoreIndexedCache(){
      try{
        const cached = await restoreDataCache();
        if (cached?.rows?.length){
          showOverlay("저장된 캐시 데이터를 복원합니다", 1200);
          await finalizeLoadedData(cached.rows, cached.meta?.sourceName || "캐시 데이터", true, false);
          return true;
        }
      } catch (err){
        console.warn("캐시 복원 실패", err);
      }
      return false;
    }
